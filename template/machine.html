<!DOCTYPE html>
<html>
<head>
    <title>{{ nom }}</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        .boite_stats { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .carte { background: #222; padding: 15px; border-radius: 10px; border-top: 4px solid #ffcc00; width: 150px; }
        .image_graphe { border: 2px solid #444; margin: 15px; width: 80%; max-width: 800px; }
        .lien_retour { color: #ffcc00; text-decoration: none; display: block; margin: 20px; }
    </style>
</head>
<body>
    <h1>Machine : {{ nom }}</h1>
    <a href="/" class="lien_retour"><- Accueil</a>

    <div class="boite_stats">
        <div class="carte"><h4>CPU</h4>{{ stats.cpu }}%</div>
        <div class="carte"><h4>RAM</h4>{{ stats.ram }}%</div>
        <div class="carte"><h4>Disque</h4>{{ stats.disque }}%</div>
    </div>

    <h3>Historiques</h3>
    <img src="/images/graph_{{ nom }}_cpu.png" class="image_graphe"><br>
    <img src="/images/graph_{{ nom }}_ram.png" class="image_graphe"><br>
    <img src="/images/graph_{{ nom }}_disque.png" class="image_graphe">
</body>
</html>
