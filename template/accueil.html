<!DOCTYPE html>
<html>
<head>
    <title>SYSMONITOR</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .bouton { display: inline-block; padding: 20px; margin: 10px; background: #333; color: #ffcc00; text-decoration: none; border-radius: 8px; border: 1px solid #555; }
        .bouton:hover { background: #444; }
    </style>
</head>
<body>
    <h1>Sysmonitor</h1>
    <h2>Parc de machines : </h2>
    <hr>
    {% for m in machines %}
        <a href="/machine/{{ m }}" class="bouton">{{ m }}</a>
    {% endfor %}
</body>
</html>
